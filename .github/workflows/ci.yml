name: CI

env:
  HUSKY: 0
  CI: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # actionlint runs before npm-dependent steps so a workflow-YAML
      # bug fails fast without paying the ~30s `npm ci` cost.
      # Installer URL and binary version are pinned to the same tag —
      # `main` is mutable and would defeat supply-chain immutability
      # even if the binary itself is pinned.
      - name: Run actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      # Strict checkJs over src (tsconfig.build.json, noEmit) — fast type
      # gate that fails in the cheap lint job before the test matrix. The
      # shipped declarations are independently gated by build:types
      # (checkJs + noEmitOnError) in the test job and prepack.
      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test (Node ${{ matrix.node }}${{ matrix.coverage && ' + Coverage' || '' }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node: ['22', '26']
        coverage: [false]
        include:
          - node: '24'
            coverage: true

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: npm test

      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        run: npm run coverage

      - name: Check coverage thresholds
        if: ${{ matrix.coverage }}
        run: npm run coverage:check

      - name: Generate coverage summary
        if: ${{ matrix.coverage }}
        continue-on-error: true
        run: |
          {
            echo "## 📊 Coverage Report"
            echo ""

            if [ -f coverage/coverage-summary.json ] && command -v jq &> /dev/null; then
              TOTAL=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
              STATEMENTS=$(jq -r '.total.statements.pct' coverage/coverage-summary.json)
              BRANCHES=$(jq -r '.total.branches.pct' coverage/coverage-summary.json)
              FUNCTIONS=$(jq -r '.total.functions.pct' coverage/coverage-summary.json)

              echo "| Metric | Coverage |"
              echo "|--------|----------|"
              echo "| **Lines** | ${TOTAL}% |"
              echo "| Statements | ${STATEMENTS}% |"
              echo "| Branches | ${BRANCHES}% |"
              echo "| Functions | ${FUNCTIONS}% |"
            else
              echo "### ℹ️ Coverage data not available"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Coveralls
        if: ${{ matrix.coverage }}
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: false

      - name: Upload coverage artifacts
        if: ${{ matrix.coverage && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
          if-no-files-found: ignore

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      # `npm pack --dry-run` runs the prepack script (node --run build), so this one
      # step both builds every artifact and verifies the published file list — a
      # failing build fails the pack. No separate build step needed.
      - name: Build & verify package contents
        run: npm pack --dry-run
