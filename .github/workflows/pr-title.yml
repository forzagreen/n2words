name: PR Title

on:
  pull_request:
    types: [opened, edited, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Skip `npm ci` — only commitlint is needed and `npx --package` fetches
      # it on demand. Major versions pinned to match package.json's caret
      # range so behavior matches local dev.
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx --yes --package=@commitlint/cli@20 --package=@commitlint/config-conventional@20 commitlint --config .commitlintrc.mjs
