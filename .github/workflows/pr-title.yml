name: PR Title

on:
  pull_request:
    # `synchronize` re-runs on every push so a fixed title goes green
    # without forcing a fresh PR open/close cycle.
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          # Shallow clone — commitlint only reads the piped title, not history.
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'

      # `npm ci --ignore-scripts` installs commitlint from package.json's
      # caret range, so this workflow uses the same major as local dev
      # and the husky hook with no separate pin to drift. Skipping scripts
      # avoids husky's prepare (no git hooks needed in CI) and any other
      # postinstall noise.
      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        # `printf '%s\n'`, not `echo` — a title starting with `-n`/`-e`
        # is otherwise swallowed by echo as a flag (POSIX echo is
        # underspecified on flag handling), so commitlint would see a
        # truncated title and could pass or fail misleadingly.
        run: printf '%s\n' "$PR_TITLE" | npx --no-install commitlint --config .commitlintrc.mjs
