name: Release

env:
  HUSKY: 0
  CI: true
  NODE_VERSION: "26"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (leave empty to auto-detect from commits)"
        required: false
        type: choice
        options: ["", "major", "minor", "patch"]
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    environment: npm

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify NODE_VERSION satisfies engines.node
        # engines.node is a floor (e.g. ">=22"). The runner's Node major
        # must clear it — otherwise we'd publish a package whose engines
        # field contradicts the toolchain that built it.
        run: |
          ENGINES_MIN=$(node -p "require('./package.json').engines.node.match(/\d+/)[0]")
          ENV_VERSION="${{ env.NODE_VERSION }}"
          echo "Node check: NODE_VERSION=$ENV_VERSION  engines.node>=$ENGINES_MIN"
          if [ "$ENV_VERSION" -lt "$ENGINES_MIN" ]; then
            echo "::error::NODE_VERSION ($ENV_VERSION) is below engines.node minimum ($ENGINES_MIN). Bump NODE_VERSION in release.yml."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      # Cache key derived from package.json's deps fields ONLY, not the
      # full lockfile. The release workflow rewrites package-lock.json's
      # root `version` on every run, so a key based on the lockfile hash
      # (what setup-node's `cache: 'npm'` shorthand uses) rotates every
      # release and accumulates a stale cache per run.
      - name: Compute npm cache key
        id: cache-key
        run: |
          HASH=$(jq -S '{dependencies,devDependencies,optionalDependencies,peerDependencies}' package.json | sha256sum | cut -c1-16)
          echo "key=npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-${HASH}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run tests
        run: npm test

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ -n "${{ inputs.bump }}" ]; then
            TAG=$(git-cliff --bump ${{ inputs.bump }} --bumped-version)
          else
            TAG=$(git-cliff --bumped-version)
          fi
          BARE="${TAG#v}"
          if [ "$BARE" = "$CURRENT" ]; then
            echo "::warning::No version change detected (already at $CURRENT). Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$BARE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next version: $TAG (current: $CURRENT)"

          # Defend against the "previous run pushed the tag but failed
          # before npm publish" case. package.json's CURRENT may not
          # reflect what's actually tagged in git.
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists in git. A previous release run probably partially completed. Manually delete the tag (git push --delete origin $TAG) or bump past it before retrying."
            exit 1
          fi

      - name: Bump package.json
        if: steps.version.outputs.skip != 'true'
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Build dist
        if: steps.version.outputs.skip != 'true'
        run: npm run build:dist

      - name: Verify build artifacts
        if: steps.version.outputs.skip != 'true'
        run: |
          echo "dist/:"
          ls -lh dist/
          echo ""
          echo "Type declarations:"
          find src -name "*.d.ts" -type f

      - name: Dry-run publish
        if: steps.version.outputs.skip != 'true'
        run: npm publish --dry-run

      - name: Generate changelog
        if: steps.version.outputs.skip != 'true'
        run: |
          BUMP_ARG="${{ inputs.bump }}"
          git-cliff --bump ${BUMP_ARG:+$BUMP_ARG} --output CHANGELOG.md
          git-cliff --bump ${BUMP_ARG:+$BUMP_ARG} --unreleased --strip header --output RELEASE_NOTES.md

      - name: Commit, tag and push
        if: steps.version.outputs.skip != 'true'
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git tag ${{ steps.version.outputs.tag }}
          git push origin main --follow-tags

      - name: Publish to npm
        if: steps.version.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance

      - name: Create release archive
        if: steps.version.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p n2words-${VERSION}/{src,dist}
          cp src/*.js src/*.d.ts n2words-${VERSION}/src/
          cp dist/*.js n2words-${VERSION}/dist/
          zip -r n2words-${VERSION}.zip n2words-${VERSION}/

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: n2words-*.zip

      - name: Generate job summary
        if: always()
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}
          SKIP=${{ steps.version.outputs.skip }}
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$SKIP" = "true" ]; then
            echo "> **Skipped** — no version change detected (already at v${VERSION})" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Version** | v${VERSION} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Tag** | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Bump** | ${{ inputs.bump || 'auto-detected' }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **npm**: https://www.npmjs.com/package/${PKG_NAME}/v/${VERSION}" >> $GITHUB_STEP_SUMMARY
            echo "- **unpkg**: https://unpkg.com/${PKG_NAME}@${VERSION}/" >> $GITHUB_STEP_SUMMARY
            echo "- **jsDelivr**: https://cdn.jsdelivr.net/npm/${PKG_NAME}@${VERSION}/" >> $GITHUB_STEP_SUMMARY
          fi
