name: Release

env:
  HUSKY: 0
  CI: true
  NODE_VERSION: "26"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (use 'auto' to detect from commits)"
        required: false
        type: choice
        options: ["auto", "major", "minor", "patch"]
        default: "auto"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    environment: npm

    steps:
      # Mint a short-lived installation token from the release-bot
      # GitHub App. The App is a bypass actor on the `main` branch
      # ruleset, so the chore(release) commit pushed below is exempt
      # from the "require a pull request" rule. The default
      # GITHUB_TOKEN / github-actions[bot] is NOT a bypass actor —
      # pushing with it is what the ruleset rejected, leaving a
      # published npm version with no tag or commit on main.
      - name: Mint release-bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          # `app-id` (the App's numeric ID), not `client-id`: both work
          # in v3, but actionlint's bundled action metadata doesn't know
          # `client-id` yet and fails the lint gate on it. Switch when
          # the pinned actionlint recognizes it.
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Persisted as the push credential for "Tag and push to
          # origin" below — that push then authenticates as the App
          # (the bypass actor), not github-actions[bot].
          token: ${{ steps.app-token.outputs.token }}

      - name: Verify NODE_VERSION satisfies engines.node
        # engines.node lists the supported LTS lines (e.g.
        # "^22 || ^24 || ^26"); the regex pulls the lowest major as a floor.
        # The runner's Node major must clear it — otherwise we'd publish a
        # package whose engines field contradicts the toolchain that built it.
        run: |
          ENGINES_MIN=$(node -p "require('./package.json').engines.node.match(/\d+/)[0]")
          ENV_VERSION="${{ env.NODE_VERSION }}"
          echo "Node check: NODE_VERSION=$ENV_VERSION  engines.node>=$ENGINES_MIN"
          if [ "$ENV_VERSION" -lt "$ENGINES_MIN" ]; then
            echo "::error::NODE_VERSION ($ENV_VERSION) is below engines.node minimum ($ENGINES_MIN). Bump NODE_VERSION in release.yml."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      # Cache key derived from package.json's deps fields ONLY, not the
      # full lockfile. The release workflow rewrites package-lock.json's
      # root `version` on every run, so a key based on the lockfile hash
      # (what setup-node's `cache: 'npm'` shorthand uses) rotates every
      # release and accumulates a stale cache per run.
      - name: Compute npm cache key
        id: cache-key
        run: |
          HASH=$(jq -S '{dependencies,devDependencies,optionalDependencies,peerDependencies}' package.json | sha256sum | cut -c1-16)
          echo "key=npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-${HASH}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            npm-${{ runner.os }}-node${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run tests
        run: npm test

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "${{ inputs.bump }}" = "auto" ]; then
            TAG=$(git-cliff --bumped-version)
          else
            TAG=$(git-cliff --bump ${{ inputs.bump }} --bumped-version)
          fi
          BARE="${TAG#v}"
          if [ "$BARE" = "$CURRENT" ]; then
            echo "::warning::No version change detected (already at $CURRENT). Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$BARE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next version: $TAG (current: $CURRENT)"

          # Defend against the "previous run pushed the tag but failed
          # before npm publish" case. package.json's CURRENT may not
          # reflect what's actually tagged in git.
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists in git. A previous release run probably partially completed. Manually delete the tag (git push --delete origin $TAG) or bump past it before retrying."
            exit 1
          fi

      - name: Bump package.json
        if: steps.version.outputs.skip != 'true'
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      # `npm publish --dry-run` runs the prepack script (node --run build), which
      # builds dist/ + type declarations and leaves them on disk for the steps
      # that follow (Verify below, the real Publish, Create release archive).
      # A failing build fails the dry run, gating the release before any commit,
      # tag, or publish happens.
      - name: Dry-run publish
        if: steps.version.outputs.skip != 'true'
        run: npm publish --dry-run

      - name: Verify build artifacts
        if: steps.version.outputs.skip != 'true'
        run: |
          echo "dist/:"
          ls -lh dist/
          echo ""
          echo "Type declarations:"
          find src -name "*.d.ts" -type f

      # `--unreleased --prepend` adds ONLY the new version's section to
      # the top of the existing CHANGELOG.md. The old `--output`
      # regenerated the whole file from git history, which (with this
      # cliff.toml) would flatten every prior release — including the
      # hand-written 3.0.0 migration tables — into tool-generated text.
      # RELEASE_NOTES.md is the same new section with the title stripped,
      # for the GitHub Release body.
      - name: Generate changelog
        if: steps.version.outputs.skip != 'true'
        run: |
          if [ "${{ inputs.bump }}" = "auto" ]; then
            git-cliff --bump --unreleased --prepend CHANGELOG.md
            git-cliff --bump --unreleased --strip header --output RELEASE_NOTES.md
          else
            git-cliff --bump ${{ inputs.bump }} --unreleased --prepend CHANGELOG.md
            git-cliff --bump ${{ inputs.bump }} --unreleased --strip header --output RELEASE_NOTES.md
          fi

      # Commit locally only — defer the push until AFTER `npm publish`
      # succeeds (see "Tag and push to origin" below). `[skip ci]` keeps
      # the eventual push from re-triggering ci.yml on main, which would
      # waste a billing minute re-running checks that already passed on
      # the parent PR. The bump commit goes onto whatever the runner
      # checked out; origin only learns about it after the artifact is
      # durable on npm.
      - name: Commit chore(release) locally
        if: steps.version.outputs.skip != 'true'
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.tag }} [skip ci]"

      - name: Publish to npm
        if: steps.version.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance

      # Tag + push deferred until AFTER `npm publish` lands the
      # artifact. Prior shape pushed first; an npm-publish failure (OIDC
      # expiry, registry hiccup, etc.) left the tag on origin pointing
      # at a version that wasn't on npm, and the next run tripped the
      # "tag exists" guard. Now: tag on origin ⇒ artifact on npm.
      #
      # Annotated tag (`-a`) — `--follow-tags` only pushes annotated
      # tags; lightweight ones are silently skipped. `--atomic` makes
      # the main + tag advance server-side all-or-nothing, closing the
      # narrower "commit lands but tag doesn't" anomaly.
      #
      # Do NOT rebase onto origin/main before pushing. The npm package
      # was already published from THIS chore(release) commit's tree.
      # A rebase would replay that commit onto any PR that merged during
      # the build, so the tag's tree would include source the published
      # package was never built from (tag/artifact mismatch), and the
      # merged PR would sink below the tag where the next
      # `git-cliff --bumped-version` walk skips it — silently dropped
      # from the changelog. Let the race fail loud instead: a PR landing
      # on origin/main mid-build makes this a non-fast-forward push and
      # `--atomic` rejects both main and the tag. That is recoverable —
      # the package is already on npm; once main is stable, re-run the
      # release or push the chore(release) commit + tag by hand.
      - name: Tag and push to origin
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag -a ${{ steps.version.outputs.tag }} -m "Release ${{ steps.version.outputs.tag }}"
          git push origin main --atomic --follow-tags

      - name: Create release archive
        if: steps.version.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p n2words-${VERSION}/{src,dist}
          # Recursive copy so the zip mirrors the npm package's src/ tree —
          # a flat `src/*.js src/*.d.ts` glob silently drops src/utils/ (its
          # .js + .d.ts), which the package's `src/**/*.js` + `src/**/*.d.ts`
          # files globs ship.
          cp -r src/. n2words-${VERSION}/src/
          cp dist/*.js n2words-${VERSION}/dist/
          zip -r n2words-${VERSION}.zip n2words-${VERSION}/

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: n2words-*.zip

      - name: Generate job summary
        if: always()
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          SKIP: ${{ steps.version.outputs.skip }}
          BUMP: ${{ inputs.bump }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          {
            echo "## Release Summary"
            echo ""
            if [ "$SKIP" = "true" ]; then
              echo "> **Skipped** — no version change detected (already at v${VERSION})"
            else
              echo "| Item | Value |"
              echo "|------|-------|"
              echo "| **Version** | v${VERSION} |"
              echo "| **Tag** | \`${TAG}\` |"
              echo "| **Bump** | ${BUMP} |"
              echo ""
              echo "- **npm**: https://www.npmjs.com/package/${PKG_NAME}/v/${VERSION}"
              echo "- **unpkg**: https://unpkg.com/${PKG_NAME}@${VERSION}/"
              echo "- **jsDelivr**: https://cdn.jsdelivr.net/npm/${PKG_NAME}@${VERSION}/"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
